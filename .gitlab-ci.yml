stages:
  - refresh
  - deploy

# ── Rafraîchissement nuit des TLE (planifié via GitLab CI schedules) ──────────
refresh-tle:
  stage: refresh
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - pip install requests --quiet
    - python3 scripts/refresh_tle.py
    - git config --global user.email "ci-bot@noctilum"
    - git config --global user.name "Noctilum CI"
    - git add data/tle_*.txt
    - git diff --cached --quiet || git commit -m "chore: rafraîchissement TLE $(date -u +%Y-%m-%d)"
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:main

# ── Miroir GitLab → GitHub sur chaque push main ───────────────────────────────
mirror-to-github:
  stage: deploy
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://${GITHUB_TOKEN}@github.com/JPhBlanchard/noctilum.git || true
    - git push github HEAD:main --force
