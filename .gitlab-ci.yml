stages:
  - refresh
  - deploy

# ── Rafraîchissement nuit des TLE (planifié via GitLab CI schedules) ──────────
refresh-tle:
  stage: refresh
  image: python:3.11-slim
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  script:
    - pip install requests --quiet
    - python3 -c "
import requests, pathlib, time

GROUPS = {
  'ISS___Stations':  'https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle',
  'Lumineux_100+':   'https://celestrak.org/NORAD/elements/gp.php?GROUP=visual&FORMAT=tle',
  'Starlink':        'https://celestrak.org/NORAD/elements/gp.php?GROUP=starlink&FORMAT=tle',
  'OneWeb':          'https://celestrak.org/NORAD/elements/gp.php?GROUP=oneweb&FORMAT=tle',
  'Météo_NOAA':      'https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle',
  'Science':         'https://celestrak.org/NORAD/elements/gp.php?GROUP=science&FORMAT=tle',
  'Amateur_AMSAT':   'https://celestrak.org/NORAD/elements/gp.php?GROUP=amateur&FORMAT=tle',
  'GPS':             'https://celestrak.org/NORAD/elements/gp.php?GROUP=gps-ops&FORMAT=tle',
}
headers = {'User-Agent': 'Mozilla/5.0 (compatible; Noctilum/1.0)'}
data_dir = pathlib.Path('data')
data_dir.mkdir(exist_ok=True)
for slug, url in GROUPS.items():
    try:
        r = requests.get(url, headers=headers, timeout=30)
        r.raise_for_status()
        (data_dir / f'tle_{slug}.txt').write_text(r.text, encoding='utf-8')
        print(f'OK  {slug}')
        time.sleep(1)
    except Exception as e:
        print(f'ERR {slug}: {e}')
"
    - git config --global user.email "ci-bot@noctilum"
    - git config --global user.name "Noctilum CI"
    - git add data/tle_*.txt
    - git diff --cached --quiet || git commit -m "chore: rafraîchissement TLE $(date -u +%Y-%m-%d)"
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:main

# ── Miroir GitLab → GitHub sur chaque push main ───────────────────────────────
mirror-to-github:
  stage: deploy
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - git config --global user.email "ci@gitlab.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://${GITHUB_TOKEN}@github.com/JPhBlanchard/noctilum.git || true
    - git push github HEAD:main --force
